[paths]
input_dir = data/input_files
results_dir = data/results
csv_file = data/results/benchmark_results.csv
graphs_dir = data/results/graphs

[experiment]
runs = 5
warmup_runs = 1
file_groups = F1_1MB,F2_5MB,F3_10MB,F4_50MB,F5_100MB

[crypto]
key_size_bytes = 32
ctr_nonce_size = 16
gcm_nonce_size = 12
gcm_tag_length = 16

[ui]
window_title = Entropy — AES Benchmark Tool
window_width = 1100
window_height = 720
theme = clam
